<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBATE RPG</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Phaser 3 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!--
        Scripts chargés en ordre de dépendance (pas de type="module").
        Fonctionne en file:// sans aucun serveur HTTP.
        Chaque fichier expose sa classe/constante en global.
    -->

    <!-- 1. Données statiques (aucune dépendance) -->
    <script src="src/config/manaCore.js"></script>
    <script src="src/config/spells.js"></script>

    <!-- 2. Génération de textures (dépend de : rien) -->
    <script src="src/generators/TextureGenerator.js"></script>

    <!-- 3. Systèmes (dépendent des configs) -->
    <script src="src/systems/ManaCoreSystem.js"></script>
    <script src="src/systems/SpellSystem.js"></script>

    <!-- 4. Objets de jeu (dépendent des systèmes) -->
    <script src="src/objects/Aura.js"></script>
    <script src="src/objects/Projectile.js"></script>
    <script src="src/objects/Enemy.js"></script>
    <script src="src/objects/Player.js"></script>

    <!-- 5. UI (dépend des configs et systèmes) -->
    <script src="src/ui/HUD.js"></script>
    <script src="src/ui/SpellBar.js"></script>

    <!-- 6. Scène principale (dépend de tout) -->
    <script src="src/scenes/GameScene.js"></script>

    <!-- 7. Point d'entrée (lance Phaser) -->
    <script src="src/main.js"></script>
</body>
</html>
